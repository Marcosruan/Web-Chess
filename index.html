<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css">
    <title>Web Chess</title>
</head>
<body>
    <main class="container center-center flex column bg-transparent">
        <div id="mobie-moves-history" class="flex mobile-only"></div>
        <div id="match-container" class="flex column">
            <div id="oponent-bar" class="flex items-center bg-transparent">
                <div id="oponent-group" class="flex">
                    <div id="oponent-avatar" class="flex"></div>
                    <div id="oponent-info" class="flex column bg-transparent">
                        <div id="oponent-nickname" class="flex items-center bg-transparent">
                            <p id="oponent-nickname-p">Oponent</p>
                        </div>
                        <div id="oponent-score" class="flex bg-transparent">
                            <p id="oponent-score-p">1000</p>
                        </div>
                    </div>
                </div>
                <button id="settings-button" class="mobile-settings-button flex center-center desktop-not"></button>
            </div>
            <div id="chess-board">
                <div class="pieces a8 b r brq"></div>
                <div class="pieces b8 b n bnq"></div>
                <div class="pieces c8 b b bbq"></div>
                <div class="pieces d8 b q bq"></div>
                <div class="pieces e8 b k bk"></div>
                <div class="pieces f8 b b bbk"></div>
                <div class="pieces g8 b n bnk"></div>
                <div class="pieces h8 b r brk"></div>
                <div class="pieces a7 b p bp"></div>
                <div class="pieces b7 b p bp"></div>
                <div class="pieces c7 b p bp"></div>
                <div class="pieces d7 b p bp"></div>
                <div class="pieces e7 b p bp"></div>
                <div class="pieces f7 b p bp"></div>
                <div class="pieces g7 b p bp"></div>
                <div class="pieces h7 b p bp"></div>

                <div class="pieces a1 w R wrq"></div>
                <div class="pieces b1 w N wnq"></div>
                <div class="pieces c1 w B wbq"></div>
                <div class="pieces d1 w Q wq"></div>
                <div class="pieces e1 w K wk"></div>
                <div class="pieces f1 w B wbk"></div>
                <div class="pieces g1 w N wnk"></div>
                <div class="pieces h1 w R wrk"></div>
                <div class="pieces a2 w P wp"></div>
                <div class="pieces b2 w P wp"></div>
                <div class="pieces c2 w P wp"></div>
                <div class="pieces d2 w P wp"></div>
                <div class="pieces e2 w P wp"></div>
                <div class="pieces f2 w P wp"></div>
                <div class="pieces g2 w P wp"></div>
                <div class="pieces h2 w P wp"></div>
            </div>
            <div id="player-bar" class="flex items-center bg-transparent">
                <div id="player-info" class="flex column bg-transparent">
                    <div id="player-nickname" class="flex items-center bg-transparent">
                        <p id="player-nickname-p">Player</p>
                    </div>
                    <div id="player-score" class="flex bg-transparent">
                        <p id="player-score-p">1000</p>
                    </div>
                </div>
                <div id="player-avatar" class="flex"></div>
            </div>
        </div>
        <div id="moves-history-container" class="flex mobile-not">
            <div id="settings-bar" class="flex items-center bg-transparent">
                <button id="mobile-settings-button" class="settings-button flex center-center bg-transparent tablet-not">
                </button>
            </div>
            <div id="moves-history" class="flex column"></div>
            <div id="prev-next-move-bar" class="flex items-center bg-transparent">
                <button id="prev-button" class="flex center-center desktop-not"></button>
                <button id="next-button" class="flex center-center desktop-not"></button>
            </div>
        </div>
        <div id="mobile-prev-next-buttons" class="flex items-center mobile-only">
            <button id="mobile-prev-button" class="flex center-center mobile-only"></button>
            <button id="mobile-next-button" class="flex center-center mobile-only"></button>
        </div>
    </main>
    <div id="modal">
        <div id="modal-content">
            <button id="theme-mode"></button>
            <span>Change the theme color of the page</span>
            <button id="reset-button">Reset</button>
            <span>Reset board to the default position.</span>
            <strong>After reseting, the previous match will no longer be available to play.</strong>
        </div>
    </div>
</body>

<script type="module" src="script.js"></script>
</html>
